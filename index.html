<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script>
  try {
    var t = localStorage.getItem("ironomicon-theme");
    if (t === "light") document.documentElement.dataset.theme = "light";
  } catch (e) {}
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Ironomicon — Personal Lifting Grimoire</title>
<meta name="description" content="Ironomicon — your personal grimoire of iron. Muscle map, workout logger, calendar planner and nutrition calculator." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#FF6B3D" />

<!-- iOS support (Add to Home Screen) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ironomicon" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<script src="storage.js"></script>
<script src="data-exercises.js"></script>
<script src="data-foods.js"></script>
<script src="library.js"></script>
<script src="muscle-map.js"></script>
<script src="tracker.js"></script>
<script src="calendar.js"></script>
<script src="nutrition.js"></script>
<script src="dashboard.js"></script>
<script src="library-view.js"></script>
<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
